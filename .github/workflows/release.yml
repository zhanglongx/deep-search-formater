name: Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_meta
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          RELEASE_TAG="${RAW_TAG#v}"

          echo "raw_tag=$RAW_TAG" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
        run: |
          MANIFEST_VERSION="$(node -p "require('./manifest.json').version")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if [ "$RELEASE_TAG" != "$MANIFEST_VERSION" ]; then
            echo "Normalized tag version ($RELEASE_TAG) must match manifest.json version ($MANIFEST_VERSION)."
            exit 1
          fi

          if [ "$PACKAGE_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) must match manifest.json version ($MANIFEST_VERSION)."
            exit 1
          fi

          node <<'EOF'
          const manifest = require("./manifest.json");
          const versions = require("./versions.json");

          if (!versions[manifest.version]) {
            console.error(`versions.json is missing version ${manifest.version}.`);
            process.exit(1);
          }
          EOF

      - name: Run tests
        run: npm test

      - name: Build plugin
        run: npm run build

      - name: Verify release assets
        run: |
          test -f manifest.json || { echo "manifest.json was not found."; exit 1; }
          test -f main.js || { echo "main.js was not generated by the build."; exit 1; }

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp manifest.json release/manifest.json
          cp main.js release/main.js

          if [ -f styles.css ]; then
            cp styles.css release/styles.css
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.release_meta.outputs.release_tag }}
          tag_name: ${{ steps.release_meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release/manifest.json
            release/main.js
            release/styles.css
